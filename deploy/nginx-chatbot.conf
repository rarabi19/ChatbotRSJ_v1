# ============================================================
# Nginx config untuk ChatbotRSJ
# Upload ke: /etc/nginx/sites-available/chatbot
# Lalu: sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;   # ← ganti dengan domain/IP server

    root /var/www/chatbot/public;
    index index.php;

    # Keamanan dasar
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Upload max (untuk foto ruangan)
    client_max_body_size 20M;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Proxy ke Python Flask (port 5000)
    # Laravel akan memanggil http://127.0.0.1:5000 langsung,
    # tapi jika perlu expose /api/chatbot ke publik:
    location /api/python/ {
        proxy_pass         http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Deny akses file sensitif
    location ~ /\.(env|git|claude|gemini) {
        deny all;
    }

    location ~ /\.ht {
        deny all;
    }

    # Cache gambar & aset statis
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
